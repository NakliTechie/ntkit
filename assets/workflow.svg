<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img">
<title>ntkit — when to use what</title>
<desc>A light-mode workflow map of ntkit's 20 Claude Code commands across six phases plus a daily session loop and a knowledge-vault pair.</desc>
<style>
text{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.h1{fill:#1f2328;font-size:58px;font-weight:800}
.tag{fill:#656d76;font-size:20px}
.pill{fill:#ecfeff;stroke:#9bdfec;stroke-width:1}
.pilltxt{fill:#0e7490;font-size:16px;font-weight:600}
.loopbox{fill:#ecfeff;stroke:#7cd4e3;stroke-width:1}
.loop{fill:#0e7490;font-size:17px}
.loopb{fill:#0891b2;font-weight:700}
.card{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1}
.num{fill:#0891b2}
.numt{fill:#ffffff;font-size:20px;font-weight:800}
.pname{fill:#1f2328;font-size:25px;font-weight:700}
.pwhen{fill:#656d76;font-size:15px}
.div{stroke:#d8dee4;stroke-width:1}
.cmd{fill:#1f2328;font-size:19px;font-weight:500}
.sl{fill:#0891b2;font-weight:700}
.suf{fill:#98a1ab}
.chev{fill:#c2cbd4;font-size:30px;font-weight:700}
.foot{fill:#656d76;font-size:17px}
.fb{fill:#24292f;font-weight:600}
</style>
<rect width="1600" height="900" fill="#ffffff"/>
<text x="56" y="92" class="h1">ntkit</text>
<rect x="214" y="56" width="15" height="40" rx="2" fill="#0891b2"/>
<text x="58" y="128" class="tag">when to use what  ·  the rigor layer for AI-assisted development</text>
<rect x="1368" y="52" width="176" height="38" rx="19" class="pill"/>
<text x="1456" y="77" class="pilltxt" text-anchor="middle">20 slash commands</text>
<rect x="56" y="150" width="1488" height="40" rx="10" class="loopbox"/>
<text x="80" y="176" class="loop"><tspan class="loopb">↻  The daily loop —</tspan>  /standup → /resume → …work… → /windup,  so every session resumes exactly where the last one left off.</text>
<g transform="translate(56,210)">
<rect width="477" height="296" rx="16" class="card"/>
<circle cx="42" cy="42" r="18" class="num"/><text x="42" y="49" class="numt" text-anchor="middle">1</text>
<text x="74" y="50" class="pname">START</text><text x="74" y="75" class="pwhen">kick off a new repo</text>
<line x1="24" y1="98" x2="453" y2="98" class="div"/>
<text x="28" y="135" class="cmd"><tspan class="sl">/</tspan>scaffold<tspan class="suf">-nt</tspan></text>
</g>
<g transform="translate(561,210)">
<rect width="477" height="296" rx="16" class="card"/>
<circle cx="42" cy="42" r="18" class="num"/><text x="42" y="49" class="numt" text-anchor="middle">2</text>
<text x="74" y="50" class="pname">OPEN</text><text x="74" y="75" class="pwhen">begin a day or session</text>
<line x1="24" y1="98" x2="453" y2="98" class="div"/>
<text x="28" y="135" class="cmd"><tspan class="sl">/</tspan>standup<tspan class="suf">-nt</tspan></text>
<text x="28" y="165" class="cmd"><tspan class="sl">/</tspan>resume<tspan class="suf">-nt</tspan></text>
</g>
<g transform="translate(1066,210)">
<rect width="477" height="296" rx="16" class="card"/>
<circle cx="42" cy="42" r="18" class="num"/><text x="42" y="49" class="numt" text-anchor="middle">3</text>
<text x="74" y="50" class="pname">BUILD</text><text x="74" y="75" class="pwhen">do the work, capture the why</text>
<line x1="24" y1="98" x2="453" y2="98" class="div"/>
<text x="28" y="135" class="cmd"><tspan class="sl">/</tspan>decide<tspan class="suf">-nt</tspan></text>
<text x="28" y="165" class="cmd"><tspan class="sl">/</tspan>idea<tspan class="suf">-nt</tspan></text>
<text x="28" y="195" class="cmd"><tspan class="sl">/</tspan>execute<tspan class="suf">-nt</tspan>  <tspan class="suf" font-size="15">— work the fix-batches</tspan></text>
<text x="28" y="225" class="cmd"><tspan class="sl">/</tspan>autopilot<tspan class="suf">-nt</tspan>  <tspan class="suf" font-size="15">— unattended, runs solo</tspan></text>
</g>
<text x="547" y="370" class="chev">›</text><text x="1052" y="370" class="chev">›</text>
<g transform="translate(56,528)">
<rect width="477" height="296" rx="16" class="card"/>
<circle cx="42" cy="42" r="18" class="num"/><text x="42" y="49" class="numt" text-anchor="middle">4</text>
<text x="74" y="50" class="pname">REVIEW</text><text x="74" y="75" class="pwhen">audit cold, plan the fixes</text>
<line x1="24" y1="98" x2="453" y2="98" class="div"/>
<text x="28" y="135" class="cmd"><tspan class="sl">/</tspan>forward-pass<tspan class="suf">-nt</tspan></text>
<text x="28" y="165" class="cmd"><tspan class="sl">/</tspan>walkthrough<tspan class="suf">-nt</tspan></text>
<text x="28" y="195" class="cmd"><tspan class="sl">/</tspan>ux-review<tspan class="suf">-nt</tspan></text>
<text x="28" y="225" class="cmd"><tspan class="sl">/</tspan>maintain<tspan class="suf">-nt</tspan></text>
</g>
<g transform="translate(561,528)">
<rect width="477" height="296" rx="16" class="card"/>
<circle cx="42" cy="42" r="18" class="num"/><text x="42" y="49" class="numt" text-anchor="middle">5</text>
<text x="74" y="50" class="pname">SHIP</text><text x="74" y="75" class="pwhen">demo, document, release</text>
<line x1="24" y1="98" x2="453" y2="98" class="div"/>
<text x="28" y="135" class="cmd"><tspan class="sl">/</tspan>guide<tspan class="suf">-nt</tspan></text>
<text x="28" y="165" class="cmd"><tspan class="sl">/</tspan>demo<tspan class="suf">-nt</tspan></text>
<text x="28" y="195" class="cmd"><tspan class="sl">/</tspan>package<tspan class="suf">-nt</tspan></text>
<text x="28" y="225" class="cmd"><tspan class="sl">/</tspan>release<tspan class="suf">-nt</tspan></text>
</g>
<g transform="translate(1066,528)">
<rect width="477" height="296" rx="16" class="card"/>
<circle cx="42" cy="42" r="18" class="num"/><text x="42" y="49" class="numt" text-anchor="middle">6</text>
<text x="74" y="50" class="pname">CLOSE</text><text x="74" y="75" class="pwhen">save state, hand off</text>
<line x1="24" y1="98" x2="453" y2="98" class="div"/>
<text x="28" y="135" class="cmd"><tspan class="sl">/</tspan>windup<tspan class="suf">-nt</tspan></text>
<text x="28" y="165" class="cmd"><tspan class="sl">/</tspan>replan<tspan class="suf">-nt</tspan></text>
<text x="28" y="195" class="cmd"><tspan class="sl">/</tspan>notify<tspan class="suf">-nt</tspan>  <tspan class="suf" font-size="15">— ping when a run finishes</tspan></text>
</g>
<rect x="56" y="852" width="14" height="14" rx="3" fill="#0891b2"/>
<text x="82" y="864" class="foot"><tspan class="fb">Knowledge vault</tspan> — from any repo:  <tspan class="sl">/</tspan><tspan class="fb">capture-nt</tspan> save  ·  <tspan class="sl">/</tspan><tspan class="fb">ask-nt</tspan> recall</text>
<text x="1544" y="864" class="foot" text-anchor="end">github.com/NakliTechie/ntkit  ·  MIT</text>
</svg>
